# Local dev Postgres. Production uses Supabase-managed Postgres.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ginger_sync
    ports:
      - "5433:5432"   # 5433 host-side to avoid clashing with a Supabase tunnel
    volumes:
      - pgdata:/var/lib/postgresql/data
      # No init scripts — production schema lives in Supabase (migrated from v1
      # via api/db/migrate_v1_to_v2.sh). For local dev, dump the v2 schema once
      # and mount it here if you need an offline copy.

volumes:
  pgdata:
